name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: tickrtxt-app
  REGISTRY: localhost:5000

jobs:
  build:
    runs-on: self-hosted  # Run on your on-prem server

    steps:
    - uses: actions/checkout@v4  # Checkout the code

    # Optional: Set up Docker Buildx
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    # Generate a single timestamp tag for this build
    - name: Generate image tag
      id: tag
      run: |
        TAG=$(date +%s)
        echo "TAG=$TAG" >> $GITHUB_ENV

    # Build the Docker image
    - name: Build Docker image
      run: |
        docker build . --file Dockerfile --tag $IMAGE_NAME:$TAG

    # Run Trivy security scan (log only, do not fail)
    - name: Scan Docker image for vulnerabilities with Trivy
      run: |
        echo "Running vulnerability scan..."
        trivy image --severity HIGH,CRITICAL $IMAGE_NAME:$TAG || true
        echo "Scan completed (non-blocking). Vulnerabilities are logged above."

    # Push the image to local registry
    - name: Push Docker image to local registry
      run: |
        FULL_IMAGE="$REGISTRY/$IMAGE_NAME:$TAG"
        docker tag $IMAGE_NAME:$TAG $FULL_IMAGE
        docker push $FULL_IMAGE
        echo "Image pushed: $FULL_IMAGE"
